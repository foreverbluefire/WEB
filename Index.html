<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цэргийн баярын урилга!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1b2a1f;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 12px;
    border: 1px solid rgba(255,209,102,0.18);
    pointer-events: none;
    z-index: 1;
  }

  .page-content {
    position: relative;
    z-index: 2;
    padding: 20px 16px 40px;
  }

  h1 {
    color: #ffd166;
    font-size: 3em;
  }

  button {
    background-color: #ffd166;
    border: none;
    padding: 10px 20px;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
    border-radius: 5px;
    transition: transform 0.2s, background-color 0.2s;
  }
  button:hover { transform: scale(1.1); background-color: #f0c040; }
  button:active { transform: scale(0.95); }
  button:disabled { background-color: #888; cursor: default; transform: none; }

  .card {
    background-color: rgba(45,74,47,0.85);
    padding: 20px;
    margin: 10px auto;
    max-width: 300px;
    border-radius: 10px;
    border: 1px solid rgba(255,209,102,0.12);
    transition: transform 0.2s;
    backdrop-filter: blur(2px);
  }
  .card:hover { transform: scale(1.05); }

  #details {
    display: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  input {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
    background: rgba(255,255,255,0.92);
    color: #222;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page-content">
  <h1>🎖️ Цэргийн баярын урилга! 🎉</h1>
  <p>Аз жаргалтай, баяр хөөртэй тэмдэглэе.</p>

  <button id="missionBtn" onclick="showDetails()">🎖️ Даалгавар хүлээх</button>
  <button onclick="toggleMusic()">🎵 Дуу</button>

  <div id="details">
    <h2>📍 Баярийн тухай</h2>
    <div class="card">📅 11 сарын 24</div>
    <div class="card">⏰ Өдрийн 7:00 цагт</div>
    <div class="card">📍 Сүхбаатарын талбай</div>
    <div class="card">👕 Энгийн эсвэл цэргийн</div>
  </div>

  <h2>🎯 Үйл ажиллагаа</h2>
  <div class="card">🎶 Дуу & Бүжиг</div>
  <div class="card">🎁 Бэлэг солилцох</div>
  <div class="card">🍔 Хоол & Ундаа</div>

  <input type="text" id="name" placeholder="Нэр"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <button id="rsvpBtn" onclick="submitRSVP()">Баярт оролцох</button>
</div>

<audio id="music" loop>
  <source src="/Users/student31/Biye daalt 10-1/paulyudin-chill-chill-music-513017.mp3">
</audio>

<script>
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      /* Diagonal camouflage-like stripes */
      ctx.save();
      ctx.globalAlpha = 0.025;
      ctx.strokeStyle = '#ffd166';
      ctx.lineWidth = 28;
      for (let x = -H; x < W + H; x += 70) {
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x + H * 0.5, 0);
        ctx.stroke();
      }
      ctx.restore();

      /* Top decorative chevron row */
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#ffd166';
      ctx.lineWidth = 1.5;
      const chevW = 30, chevH = 14, startX = (W % chevW) / 2;
      for (let cx = startX; cx < W; cx += chevW) {
        ctx.beginPath();
        ctx.moveTo(cx, 8);
        ctx.lineTo(cx + chevW * 0.5, 8 + chevH);
        ctx.lineTo(cx + chevW, 8);
        ctx.stroke();
      }
      ctx.restore();
    }

    window.addEventListener('resize', resize);
    resize();
  })();

  function showDetails() {
    let details = document.getElementById("details");
    let btn = document.getElementById("missionBtn");
    details.style.display = "block";
    setTimeout(() => { details.style.opacity = "1"; }, 50);
    btn.innerHTML = "Даалгаврыг хүлээн авсан";
    btn.disabled = true;
  }

  function toggleMusic() {
    let music = document.getElementById("music");
    if (music.paused) { music.play(); } else { music.pause(); }
  }

  function submitRSVP() {
    let name = document.getElementById("name").value;
    if (name.trim() === "") { alert("Please enter your name!"); return; }
    let btn = document.getElementById("rsvpBtn");
    btn.innerHTML = "Баярт оролцсон!";
    btn.disabled = true;
    btn.style.backgroundColor = "#90ee90";
  }
</script>
</body>
</html>
